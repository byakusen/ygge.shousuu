<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数直線の目もりよみ</title>
<style>
  :root{
    --ink:#28323c;
    --line:#2a3742;
    --paper:#fbfaf5;
    --grid:#e7ecef;
    --rule:#cfd8dd;
    --red:#e02424;
    --arrow:#f2602a;
    --hint:#ffd34d;
    --rand:#3a86d6;
    --regen:#34a87a;
    --check:#f2602a;
    --key:#ffffff;
    --keyline:#d7dde1;
    --ok:#2f9e60;
    --ng:#d8533a;
    --hintlbl:#2f6fd0;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    font-family:"Hiragino Maru Gothic ProN","Hiragino Kaku Gothic ProN","Yu Gothic UI",system-ui,sans-serif;
    background:
      linear-gradient(0deg, rgba(0,0,0,0.015) 1px, transparent 1px) 0 0/100% 28px,
      var(--paper);
    color:var(--ink);
    display:flex;justify-content:center;
    padding:18px 14px 40px;
  }
  .wrap{width:100%;max-width:920px;}
  h1{
    font-size:1.15rem;font-weight:800;letter-spacing:.02em;
    margin:0 0 4px;color:var(--ink);
  }
  .sub{font-size:.92rem;color:#6a7780;margin:0 0 12px;}

  /* level switch */
  .levels{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 14px;}
  .levels button{
    background:#eef2f4;color:#5a6772;border:2px solid var(--rule);
    box-shadow:none;padding:9px 18px;border-radius:12px;font-size:.95rem;
  }
  .levels button.on{background:var(--ink);color:#fff;border-color:var(--ink);}

  /* 10倍モード */
  .ops{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:2px 0 14px;}
  .ops button{
    background:#eef2f4;color:#3a4750;border:2px solid var(--rule);box-shadow:none;
    padding:10px 16px;border-radius:12px;font-size:1.05rem;
  }
  .ops button.on{background:var(--rand);color:#fff;border-color:var(--rand);}
  .qmul{text-align:center;font-weight:800;font-size:1.2rem;margin:2px 0 6px;}
  .mover{
    text-align:center;padding:6px 4px 0;
    touch-action:none;user-select:none;-webkit-user-select:none;cursor:ew-resize;
  }
  .mover svg{display:inline-block;}
  .draghint{text-align:center;font-size:.9rem;color:#8a97a0;margin:0 0 4px;}
  .moverctl{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:2px 0 2px;}
  #ptReset{background:#8a97a0;padding:12px 18px;}
  .nowval{text-align:center;font-weight:800;font-size:1.15rem;color:#3a4750;margin:6px 0 2px;}
  .revealmul{text-align:center;font-weight:900;font-size:1.3rem;color:var(--red);min-height:1.4em;margin:2px 0 0;}

  /* 小数の見方 */
  #viewnl{display:block;width:100%;height:auto;margin:6px 0 2px;}
  .viewq{text-align:center;font-weight:800;font-size:1.18rem;line-height:2.1;margin:8px 4px 2px;}
  .vbl{
    width:3.4em;font-family:inherit;font-weight:800;font-size:1.05rem;text-align:center;
    border:2px solid var(--keyline);border-radius:8px;padding:5px 2px;margin:0 .18em;
    background:#fdfdfb;color:var(--ink);vertical-align:middle;
  }
  .vbl:focus{outline:none;border-color:var(--rand);background:#fff;}

  /* 不等号 */
  .ineqhead{text-align:center;font-weight:800;font-size:1.15rem;margin:6px 0 16px;}
  .cmp{
    text-align:center;font-weight:800;font-size:3rem;line-height:1.2;
    margin:8px 0 18px;font-variant-numeric:tabular-nums;
  }
  .cmp .num{color:var(--ink);}
  .cmp .faint{
    display:inline-block;color:#cdd5da;
    background:#eef1f3;border:1px dashed #ccd4da;border-radius:7px;
    padding:0 .05em;margin-left:.03em;
  }
  .cmp .ibox{
    display:inline-block;min-width:1.05em;margin:0 .28em;
    border:3px solid var(--keyline);border-radius:10px;color:var(--red);
    padding:0 .1em;vertical-align:2px;
  }
  .cmp .ibox.filled{border-color:var(--red);}
  .choices{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:4px 0 2px;}
  .choices button{
    background:#fff;color:var(--ink);border:2px solid var(--keyline);
    box-shadow:0 4px 0 #e3e8eb;font-size:1.8rem;font-weight:900;
    width:86px;padding:8px 0;border-radius:14px;
  }
  .choices button:active{box-shadow:0 1px 0 #e3e8eb;}
  .choices button.on{background:var(--rand);color:#fff;border-color:var(--rand);box-shadow:0 4px 0 rgba(0,0,0,.16);}
  .ineqfb{text-align:center;font-weight:900;font-size:1.4rem;min-height:1.5em;margin:8px 0 0;}
  .ineqfb.ok{color:var(--ok);} .ineqfb.ng{color:var(--ng);} .ineqfb.neutral{color:#6a7780;font-size:1.05rem;}

  /* kg単位 */
  .kghead{text-align:center;font-weight:800;font-size:1.12rem;margin:6px 0 4px;}
  .kgweight{text-align:center;font-weight:900;font-size:2rem;color:var(--ink);margin:2px 0 8px;}
  #kggrid{display:block;width:100%;max-width:430px;height:auto;margin:0 auto;}

  /* number line card */
  .board{
    position:relative;
    background:#fff;border:2px solid var(--rule);border-radius:18px;
    padding:14px 10px 6px;
    box-shadow:0 6px 0 rgba(42,55,66,.06);
    overflow:hidden;
  }
  /* はなまる */
  .maru{
    position:absolute;inset:0;display:flex;
    align-items:center;justify-content:center;
    pointer-events:none;z-index:5;
    opacity:0;visibility:hidden;
    transition:opacity .55s ease, visibility .55s ease;
  }
  .maru.show{opacity:1;visibility:visible;transition:opacity .12s ease, visibility 0s;}
  .maru img{
    width:46%;max-width:240px;height:auto;
    filter:drop-shadow(0 6px 14px rgba(224,36,36,.25));
  }
  .maru.show img{
    animation:pop .5s cubic-bezier(.18,1.5,.4,1) both;
  }
  @keyframes pop{
    0%{transform:scale(.2) rotate(-18deg);opacity:0;}
    60%{transform:scale(1.12) rotate(6deg);opacity:1;}
    100%{transform:scale(1) rotate(0);opacity:1;}
  }
  @media(prefers-reduced-motion:reduce){ .maru img{animation:none;} }
  /* ばつ（まちがい）※はなまると同じ動き・音なし */
  .batsu{
    position:absolute;inset:0;display:flex;
    align-items:center;justify-content:center;
    pointer-events:none;z-index:5;
    opacity:0;visibility:hidden;
    transition:opacity .55s ease, visibility .55s ease;
  }
  .batsu.show{opacity:1;visibility:visible;transition:opacity .12s ease, visibility 0s;}
  .batsu svg{ width:40%;max-width:200px;height:auto;
    filter:drop-shadow(0 6px 14px rgba(224,36,36,.25)); }
  .batsu.show svg{ animation:pop .5s cubic-bezier(.18,1.5,.4,1) both; }
  @media(prefers-reduced-motion:reduce){ .batsu svg{animation:none;} }
  svg{display:block;width:100%;height:auto;}
  .question{
    text-align:center;font-weight:800;font-size:1.08rem;
    margin:8px 0 2px;color:var(--ink);
  }
  .question .u{color:#6a7780;font-weight:700;}

  /* controls row */
  .row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:16px 0 6px;}
  button{
    font-family:inherit;cursor:pointer;border:none;border-radius:14px;
    font-weight:800;color:#fff;padding:13px 18px;font-size:1rem;
    box-shadow:0 4px 0 rgba(0,0,0,.16);transition:transform .04s, box-shadow .04s;
    -webkit-tap-highlight-color:transparent;
  }
  button:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.16);}
  button:focus-visible{outline:3px solid #2a3742;outline-offset:2px;}
  .b-hint{background:var(--hint);color:#5a4a00;}
  .b-hint.on{background:#ffbf1f;color:#5a4a00;box-shadow:inset 0 0 0 3px #fff,0 4px 0 rgba(0,0,0,.16);}
  .b-rand{background:var(--rand);}
  .b-regen{background:var(--regen);}
  .b-reveal{background:#8a97a0;}

  /* answer area */
  .answer{
    margin-top:18px;background:#fff;border:2px solid var(--rule);border-radius:18px;
    padding:16px;box-shadow:0 6px 0 rgba(42,55,66,.06);
  }
  .answer .lbl{font-weight:800;font-size:1rem;margin-bottom:10px;}
  .ansline{display:flex;gap:10px;align-items:stretch;flex-wrap:wrap;}
  #ans{
    flex:1 1 200px;min-width:0;font-family:inherit;font-weight:800;
    font-size:2rem;text-align:center;letter-spacing:.04em;
    padding:10px 12px;border:3px solid var(--keyline);border-radius:14px;
    background:#fdfdfb;color:var(--ink);
  }
  #ans:focus{outline:none;border-color:var(--rand);}
  .ansline .unit{display:flex;align-items:center;font-weight:800;font-size:1.4rem;color:#6a7780;padding:0 4px;}
  .b-check{background:var(--check);flex:0 0 auto;padding:0 22px;font-size:1.05rem;}

  /* keypad */
  .pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px;}
  .pad button{
    background:var(--key);color:var(--ink);font-size:1.5rem;padding:16px 0;
    border:2px solid var(--keyline);box-shadow:0 4px 0 #e3e8eb;
  }
  .pad button:active{box-shadow:0 1px 0 #e3e8eb;}
  .pad .k-dot{color:var(--red);}
  .pad .k-back{color:#6a7780;}
  .pad .k-clear{background:#fdeee9;color:var(--ng);border-color:#f3cdc0;box-shadow:0 4px 0 #f0d6cb;}

  /* feedback */
  .fb{min-height:38px;text-align:center;font-weight:900;font-size:1.5rem;margin-top:12px;}
  .fb.ok{color:var(--ok);}
  .fb.ng{color:var(--ng);}
  .fb.neutral{color:#6a7780;font-size:1.05rem;}

  @media(max-width:520px){
    h1{font-size:1.05rem;}
    #ans{font-size:1.7rem;}
    button{padding:12px 14px;font-size:.95rem;}
    .mover{font-size:2.5rem;}
    .qmul{font-size:1.05rem;}
    .viewq{font-size:1.02rem;line-height:2;}
    .cmp{font-size:2.1rem;}
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>数直線の目もりよみ</h1>
  <p class="sub" id="sub">矢印（↑）がさす目もりは何mかな？ 1目もりは 0.001 です。</p>
  <div class="levels">
    <button id="tab1" class="on">数直線1</button>
    <button id="tabKg">kg単位</button>
    <button id="tabIneq">不等号</button>
    <button id="tab2">数直線2</button>
    <button id="tab3">10倍</button>
    <button id="tab4">小数の見方</button>
  </div>

  <div class="board">
    <div id="nlArea">
      <svg id="nl" viewBox="0 0 1060 220" role="img" aria-label="数直線"></svg>
      <p class="question">↑ の目もりは <span class="u">何 m</span> ？</p>
    </div>

    <div id="mulArea" style="display:none">
      <div class="ops" id="ops">
        <button data-op="x10" class="on">×10</button>
        <button data-op="x100">×100</button>
        <button data-op="d10">1/10</button>
        <button data-op="d100">1/100</button>
        <button data-op="rand">ランダム</button>
      </div>
      <p class="qmul" id="qmul"></p>
      <div class="mover" id="mover"></div>
      <p class="draghint" id="draghint">小数点（<span style="color:var(--red);font-weight:900">.</span>）を 左右に ドラッグ してね</p>
      <div class="moverctl">
        <button id="ptReset">もとにもどす</button>
      </div>
      <p class="revealmul" id="revealmul"></p>
    </div>

    <div id="viewArea" style="display:none">
      <div class="ops" id="vops">
        <button data-vp="v1" class="on">あわせた数</button>
        <button data-vp="v2">○より小さい</button>
        <button data-vp="v3">0.01が□こ</button>
        <button data-vp="v4">1・0.1・0.01</button>
        <button data-vp="rand">ランダム</button>
      </div>
      <svg id="viewnl" viewBox="0 0 1040 200" role="img" aria-label="数直線"></svg>
      <p class="viewq" id="viewq"></p>
      <p class="revealmul" id="viewreveal"></p>
    </div>

    <div id="ineqArea" style="display:none">
      <p class="ineqhead">□ に あてはまる 不等号を えらびましょう。</p>
      <div class="cmp" id="cmp"></div>
      <div class="choices" id="ineqChoices">
        <button data-sym="&gt;">＞</button>
        <button data-sym="=">＝</button>
        <button data-sym="&lt;">＜</button>
      </div>
      <p class="ineqfb" id="ineqfb"></p>
    </div>

    <div id="kgArea" style="display:none">
      <p class="kghead">下の 重さを kg で あらわしましょう。</p>
      <p class="kgweight" id="kgweight"></p>
      <div id="kggrid"></div>
      <p class="revealmul" id="kgreveal"></p>
    </div>

    <div class="maru" id="maru" aria-hidden="true">
      <img src="https://raw.githubusercontent.com/byakusen/hanamaru/refs/heads/main/hanamaru2.png" alt="はなまる">
    </div>
    <div class="batsu" id="batsu" aria-hidden="true">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <line x1="24" y1="24" x2="76" y2="76" stroke="var(--red)" stroke-width="15" stroke-linecap="round"/>
        <line x1="76" y1="24" x2="24" y2="76" stroke="var(--red)" stroke-width="15" stroke-linecap="round"/>
      </svg>
    </div>
    <audio id="seikai" src="https://github.com/byakusen/gogelige.quiz/raw/refs/heads/main/quiz_seikai.mp3" preload="auto"></audio>
  </div>

  <div class="row" id="rowNL">
    <button class="b-hint" id="hintBtn">ヒント（0をつける）</button>
    <button class="b-rand" id="randBtn">ランダム（矢印をかえる）</button>
    <button class="b-regen" id="regenBtn">再生成（数をかえる）</button>
  </div>
  <div class="row" id="rowMul" style="display:none"></div>
  <div class="row" id="rowView" style="display:none">
    <button class="b-hint" id="vHintBtn">ヒント（3.1・3.2…）</button>
    <button class="b-rand" id="vRandBtn">ランダム（数をかえる）</button>
    <button class="b-regen" id="vRegenBtn">再生成（はんいをかえる）</button>
  </div>
  <div class="row" id="rowIneq" style="display:none">
    <button class="b-hint" id="iHideBtn">かくす（うすく）</button>
    <button class="b-rand" id="iNextBtn">つぎの問題</button>
    <button class="b-reveal" id="iRevealBtn">こたえを見る</button>
  </div>
  <div class="row" id="rowKg" style="display:none">
    <button class="b-hint" id="kgHintBtn">ヒント（マスに数を入れる）</button>
    <button class="b-rand" id="kgNextBtn">つぎの問題</button>
    <button class="b-regen" id="kgHardBtn">むずかしい</button>
  </div>

  <div class="answer">
    <div class="lbl">こたえ</div>
    <div class="ansline">
      <input id="ans" inputmode="decimal" placeholder="れい：4.297" autocomplete="off">
      <div class="unit" id="unit">m</div>
      <button class="b-check" id="checkBtn">こたえあわせ</button>
    </div>

    <div class="pad">
      <button data-k="7">7</button><button data-k="8">8</button><button data-k="9">9</button>
      <button data-k="4">4</button><button data-k="5">5</button><button data-k="6">6</button>
      <button data-k="1">1</button><button data-k="2">2</button><button data-k="3">3</button>
      <button class="k-dot" data-k=".">.</button>
      <button data-k="0">0</button>
      <button class="k-back" data-k="back">←</button>
    </div>
    <div class="pad" style="grid-template-columns:1fr 1fr;margin-top:10px;">
      <button class="k-clear" data-k="clear">ぜんぶけす</button>
      <button class="b-reveal" id="revealBtn">こたえを見る</button>
    </div>

    <div class="fb" id="fb"></div>
  </div>
</div>

<script>
(function(){
  "use strict";
  // すべて「1000分の1（thousandths）」の整数で管理して誤差をなくす
  var level   = 1;
  var baseTh  = 4300;   // レベル1=まんなかの数 / レベル2=左はしの数
  var arrowTh = 4297;
  var hintStage = 0;    // 0=なし。レベル1は1まで、レベル2は2まで
  var revealed  = false;

  // 表示モードと「10倍」モードの状態
  var mode = 'nl1';       // 'nl1' | 'nl2' | 'mul'
  var digits = '085';     // もとの数の数字（固定。例 0.85→"085", 1.35→"135"）
  var BASEPOS = 1;        // もとの数は「1けた目の右」に点（d0.d1d2）
  var pointPos = 1;       // いまの小数点の位置＝点の左にある元の数字の数（-1〜3）
  var mulOp = 'x10';      // えらんでいる問題
  var mulRevealed = false;
  var mulRand = false;    // 「ランダム」を選んでいるか
  var mvOffset = 0;       // 2けたの数を中央に寄せるための横ずらし
  var mulIsInteger = false; // いまの問題が整数スタートか（割り算だけ）
  var mulPlaced = true;   // 整数問題で「小数点をつけた」か（整数以外はつねにtrue）
  var mulPointShown = false; // 整数問題で、候補の点をもう置いたか（最初はfalse＝点なし）
  var mulMsg = '';        // 点をつける段階のひとことメッセージ

  // 「小数の見方」モードの状態
  var viewInt=3, viewD1=4, viewD2=5;   // 3.45
  var viewVp='v1', viewHint=false, viewRevealed=false;
  var viewRand=false;          // 「ランダム」見方を選んでいるか
  var viewExpected=[];

  var BASEY = 120, LEFT = 50;
  function rnd(a,b){ return a + Math.floor(Math.random()*(b-a+1)); }
  function fmt1(th){ return (th/1000).toFixed(1); }   // 4.3 / 2.4
  function fmt2(th){ return (th/1000).toFixed(2); }   // 4.29 / 2.45
  function fmt3(th){ return (th/1000).toFixed(3); }   // こたえ

  // レベルごとの数直線パラメータ
  function cfg(){
    if(level===1){
      return { axisMin:baseTh-14, drawMin:baseTh-13, drawMax:baseTh+13, PX:33,
               majors:[baseTh-10, baseTh, baseTh+10] };
    }
    return { axisMin:baseTh-4, drawMin:baseTh-3, drawMax:baseTh+53, PX:16.5,
             majors:[baseTh, baseTh+10, baseTh+20, baseTh+30, baseTh+40, baseTh+50] };
  }
  function xOf(th){ var c=cfg(); return LEFT + (th - c.axisMin)*c.PX; }
  function maxHint(){ return level===1 ? 1 : 2; }

  var svg = document.getElementById('nl');

  function txt(th,text,size,fill){
    return '<text x="'+xOf(th)+'" y="78" text-anchor="middle" font-size="'+size+'" font-weight="800" fill="'+fill+'">'+text+'</text>';
  }

  function render(){
    var c = cfg(), s='';

    // 軸
    s += '<line x1="'+xOf(c.axisMin)+'" y1="'+BASEY+'" x2="1018" y2="'+BASEY+'" stroke="var(--line)" stroke-width="3.5" stroke-linecap="round"/>';

    // 目もり（0.005 の真ん中は少し長く）
    for(var th=c.drawMin; th<=c.drawMax; th++){
      var major = c.majors.indexOf(th)!==-1;
      var mid   = (th % 10 === 5);
      var top = major ? BASEY-28 : (mid ? BASEY-21 : BASEY-14);
      var sw  = major ? 3 : (mid ? 1.9 : 1.4);
      s += '<line x1="'+xOf(th)+'" y1="'+top+'" x2="'+xOf(th)+'" y2="'+BASEY+'" stroke="var(--line)" stroke-width="'+sw+'"/>';
    }

    // ラベル
    if(level===1){
      var L0=baseTh-10, L1=baseTh, L2=baseTh+10;
      s += txt(L0, fmt2(L0), 30, 'var(--ink)');
      s += txt(L2, fmt2(L2), 30, 'var(--ink)');
      var ctr = '<text x="'+xOf(L1)+'" y="78" text-anchor="middle" font-size="30" font-weight="800" fill="var(--ink)">'+fmt1(L1);
      ctr += (hintStage>=1) ? '<tspan fill="var(--red)">0</tspan>' : '';
      ctr += '</text>';
      s += ctr;
    } else {
      var lo=baseTh, hi=baseTh+50;
      var left = '<text x="'+xOf(lo)+'" y="78" text-anchor="middle" font-size="30" font-weight="800" fill="var(--ink)">'+fmt1(lo);
      left += (hintStage>=2) ? '<tspan fill="var(--red)">0</tspan>' : '';   // ヒント②
      left += '</text>';
      s += left;
      s += txt(hi, fmt2(hi), 30, 'var(--ink)');
      if(hintStage>=1){                                                      // ヒント①：中間の数
        [10,20,30,40].forEach(function(d){
          s += txt(baseTh+d, fmt2(baseTh+d), 26, 'var(--hintlbl)');
        });
      }
    }

    // (m)
    s += '<text x="1026" y="88" text-anchor="end" font-size="26" font-weight="700" fill="#6a7780">(m)</text>';

    // 矢印
    var ax = xOf(arrowTh);
    s += '<line x1="'+ax+'" y1="'+(BASEY+40)+'" x2="'+ax+'" y2="'+(BASEY+10)+'" stroke="var(--arrow)" stroke-width="5" stroke-linecap="round"/>';
    s += '<path d="M '+(ax-11)+' '+(BASEY+18)+' L '+(ax+11)+' '+(BASEY+18)+' L '+ax+' '+(BASEY+4)+' Z" fill="var(--arrow)"/>';
    s += '<text x="'+ax+'" y="'+(BASEY+66)+'" text-anchor="middle" font-size="26" font-weight="900" fill="var(--arrow)">?</text>';

    if(revealed){
      s += '<text x="'+ax+'" y="'+(BASEY-44)+'" text-anchor="middle" font-size="28" font-weight="900" fill="var(--red)">'+fmt3(arrowTh)+'</text>';
    }

    svg.innerHTML = s;
    updateHintBtn();
  }

  function newArrow(){
    var c=cfg(), loTh, hiTh;
    if(level===1){ loTh=baseTh-12; hiTh=baseTh+12; }
    else { loTh=baseTh+1; hiTh=baseTh+49; }
    var cand=[];
    for(var th=loTh; th<=hiTh; th++){
      if(c.majors.indexOf(th)!==-1) continue;   // 0.01 のふしめは除く
      cand.push(th);
    }
    arrowTh = cand[rnd(0,cand.length-1)];
    revealed = false;
  }

  function regenerate(){
    baseTh = rnd(1,9)*1000 + rnd(1,9)*100;   // 例 4.3 / 2.4 / 7.6
    hintStage = 0;
    newArrow();
  }

  // --- 10倍モード（数字は固定・小数点だけ動く / SVG）---
  function opShift(op){ return op==='x10'?1 : op==='x100'?2 : op==='d10'?-1 : -2; }
  function opLabel(op){ return op==='x10'?'10倍' : op==='x100'?'100倍' : op==='d10'?'1/10' : '1/100'; }
  function opIsMul(op){ return op==='x10' || op==='x100'; }
  function targetPos(op){ return BASEPOS + opShift(op); }   // 正かいの点の位置

  // 数の列レイアウト（固定）：col0,1=左の0 / col2,3,4=元の数字 / col5,6=右の0
  var MV_M = 26, MV_W = 62, MV_VW = 480;
  function colCenter(c){ return MV_M + c*MV_W + MV_W/2 + mvOffset; }
  function dotX(pos){ return MV_M + (pos+2)*MV_W + mvOffset; }   // pos の小数点x

  // pos の数を文字列で（値の判定・表示用）
  function plainAt(pos){
    var LEN = digits.length;
    if(pos>=1){
      if(pos<=LEN){ var ip=digits.slice(0,pos), fp=digits.slice(pos); return ip + (fp?('.'+fp):''); }
      var z=''; for(var j=0;j<pos-LEN;j++) z+='0'; return digits + z;   // 整数＋末尾の0（×10/×100）
    }
    var zeros=-pos, fill=''; for(var i=0;i<zeros;i++) fill+='0'; return '0.'+fill+digits;
  }
  function cleanNum(p){ var v=parseFloat(p); return isNaN(v)?'':String(v); }
  function mulCorrect(){ return parseFloat(plainAt(targetPos(mulOp))); }

  function dtext(cx, ch, fill){
    return '<text x="'+cx+'" y="64" text-anchor="middle" font-size="56" font-weight="800" fill="'+fill+'">'+ch+'</text>';
  }
  function buildMoverSVG(){
    var LEN = digits.length;
    var placing = (mulIsInteger && !mulPlaced);   // 整数問題で、まだ点をつけていない段階
    var s = '<svg viewBox="0 0 '+MV_VW+' 132" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:460px;height:auto">';
    // 左の0（割り算で点が左に出るとき）。点をつける段階では出さない
    if(!placing){
      if(pointPos<=0){ s += dtext(colCenter(1),'0','#c2cace'); }
      if(pointPos<=-1){ s += dtext(colCenter(0),'0','#c2cace'); }
    }
    // 元の数字（いつも同じ位置・等間かく）
    for(var k=0;k<LEN;k++){ s += dtext(colCenter(k+2), digits.charAt(k), 'var(--ink)'); }

    if(placing){
      // 点をつける段階：点がつけられる場所を「あきスロット」で示す（1..LEN）。
      // まだ選んでいなければ点は出さない。えらんだ場所だけ赤い点。
      for(var sp=1; sp<=LEN; sp++){
        if(mulPointShown && sp===pointPos){
          s += '<circle cx="'+dotX(sp)+'" cy="60" r="6" fill="var(--red)"/>';
        } else {
          s += '<circle cx="'+dotX(sp)+'" cy="60" r="6" fill="none" stroke="#b9c2c7" stroke-width="2" stroke-dasharray="3 3"/>';
        }
      }
      s += '</svg>';
      return s;
    }

    // 右の0（かけ算で点が右に出るとき）
    for(var j=0; j < pointPos-LEN; j++){ s += dtext(colCenter(2+LEN+j),'0','#c2cace'); }
    // もとの小数点（うす灰色）
    s += '<circle cx="'+dotX(BASEPOS)+'" cy="60" r="5" fill="#c2cace"/>';
    // 動いたぶんだけ「10倍」または「1/10」の弧を1つずつ
    var delta = pointPos - BASEPOS;
    if(delta !== 0){
      var stepLabel = (delta>0) ? '10倍' : '1/10';
      var n = Math.abs(delta);
      for(var h=0; h<n; h++){
        var from = (delta>0) ? (BASEPOS+h) : (BASEPOS-h);
        var to   = (delta>0) ? (from+1) : (from-1);
        var x1=dotX(from), x2=dotX(to), mx=(x1+x2)/2;
        s += '<path d="M '+x1+' 74 Q '+mx+' 100 '+x2+' 74" fill="none" stroke="var(--red)" stroke-width="3.5"/>';
        s += '<path d="M '+(x2-6)+' 80 L '+(x2+6)+' 80 L '+x2+' 69 Z" fill="var(--red)"/>';
        s += '<text x="'+mx+'" y="118" text-anchor="middle" font-size="16" font-weight="800" fill="var(--red)">'+stepLabel+'</text>';
      }
    }
    // いまの小数点（赤）
    s += '<circle cx="'+dotX(pointPos)+'" cy="60" r="6" fill="var(--red)"/>';
    s += '</svg>';
    return s;
  }

  function renderMul(){
    var baseStr = plainAt(BASEPOS);                 // "6.74" / "63.8" / "638" / "89"
    document.getElementById('qmul').textContent =
      baseStr+' を '+opLabel(mulOp)+' '+(opIsMul(mulOp)?'した':'にした')+'数は？';
    document.getElementById('mover').innerHTML = buildMoverSVG();
    var dh = document.getElementById('draghint');
    if(dh){
      if(mulIsInteger && !mulPlaced){
        dh.innerHTML = '小数点は どこに つく？　点（<span style="color:var(--red);font-weight:900">.</span>）が つく ところ を タップ（ドラッグ）で えらんでね。';
      } else {
        dh.innerHTML = '小数点（<span style="color:var(--red);font-weight:900">.</span>）を 左右に ドラッグ してね';
      }
    }
    var rv = document.getElementById('revealmul');
    if(mulIsInteger && !mulPlaced && !mulRevealed){
      rv.textContent = mulMsg;
    } else {
      rv.textContent = mulRevealed ? ('こたえ：'+cleanNum(plainAt(targetPos(mulOp)))) : '';
    }
  }

  // 数の作りかた（けた数とスタート位置）
  //  ・×10/×100：整数スタートなし。「先頭に0（0.xx/0.xxx）」を多めに
  //  ・1/10/1/100：整数（23・89・638）も小数も。2けたと3けたを半々で
  function newMul(op){
    op = op || mulOp;
    var isDiv = (op==='d10' || op==='d100');
    var len, basepos, r;
    if(isDiv){
      len = (rnd(0,1)===0) ? 2 : 3;                  // 2けた／3けた を半々
      if(len===2){
        basepos = (rnd(0,9)<7) ? 2 : 1;              // 89(整数)70% / 8.9 30%
      } else {
        r = rnd(0,9);
        basepos = (r<5) ? 3 : (r<8 ? 2 : 1);         // 638(整数)50% / 63.8 30% / 6.38 20%
      }
    } else {
      len = (rnd(0,2)===0) ? 2 : 3;                  // 2けた約1/3・3けた約2/3
      r = rnd(0,9);
      if(len===2){
        basepos = (r<7) ? 0 : 1;                     // 0.89 70% / 8.9 30%（整数なし）
      } else {
        basepos = (r<6) ? 0 : (r<9 ? 1 : 2);         // 0.638 60% / 6.38 30% / 63.8 10%（整数なし）
      }
    }
    var ds=''; for(var i=0;i<len;i++){ ds += rnd(1,9); } // 各けた1〜9（先頭0や空位0を避ける）
    digits = ds;
    mvOffset = (len===2) ? (MV_W/2) : 0;             // 2けたは中央に寄せる
    BASEPOS = basepos;
    mulIsInteger = (BASEPOS === len);               // 点が右はし＝整数スタート（割り算だけ）
    if(mulIsInteger){ pointPos = len; mulPlaced = false; mulPointShown = false; mulMsg = ''; }
    else { pointPos = BASEPOS; mulPlaced = true; mulPointShown = false; mulMsg = ''; }
    mulRevealed = false;
  }

  // --- 小数の見方モード ---
  function vStr(){ return viewInt+'.'+viewD1+viewD2; }              // "3.45"
  function vUpperStr(){ var u=viewInt + (viewD1+1)/10; return String(Math.round(u*10)/10); } // 3.5 / 4

  function renderViewNL(){
    var M=50, PX=9, baseY=120, s='';
    function x(h){ return M + h*PX; }
    s += '<line x1="'+x(0)+'" y1="'+baseY+'" x2="'+(x(100)+10)+'" y2="'+baseY+'" stroke="var(--line)" stroke-width="3.5" stroke-linecap="round"/>';
    for(var h=0; h<=100; h++){
      var major=(h%10===0), medium=(h%5===0);
      var top = major ? baseY-28 : (medium ? baseY-21 : baseY-14);
      var sw  = major ? 3 : (medium ? 1.9 : 1.2);
      s += '<line x1="'+x(h)+'" y1="'+top+'" x2="'+x(h)+'" y2="'+baseY+'" stroke="var(--line)" stroke-width="'+sw+'"/>';
    }
    s += '<text x="'+x(0)+'" y="78" text-anchor="middle" font-size="30" font-weight="800" fill="var(--ink)">'+viewInt+'</text>';
    s += '<text x="'+x(100)+'" y="78" text-anchor="middle" font-size="30" font-weight="800" fill="var(--ink)">'+(viewInt+1)+'</text>';
    if(viewHint){
      for(var t=1;t<=9;t++){
        s += '<text x="'+x(t*10)+'" y="78" text-anchor="middle" font-size="22" font-weight="800" fill="var(--hintlbl)">'+viewInt+'.'+t+'</text>';
      }
    }
    var ax = x(viewD1*10+viewD2);
    s += '<line x1="'+ax+'" y1="'+(baseY+38)+'" x2="'+ax+'" y2="'+(baseY+8)+'" stroke="var(--arrow)" stroke-width="5" stroke-linecap="round"/>';
    s += '<path d="M '+(ax-11)+' '+(baseY+16)+' L '+(ax+11)+' '+(baseY+16)+' L '+ax+' '+(baseY+2)+' Z" fill="var(--arrow)"/>';
    s += '<text x="'+ax+'" y="'+(baseY+62)+'" text-anchor="middle" font-size="26" font-weight="900" fill="var(--arrow)">'+vStr()+'</text>';
    document.getElementById('viewnl').innerHTML = s;
  }

  function blankInput(i){ return '<input class="vbl" inputmode="decimal" data-i="'+i+'" autocomplete="off">'; }
  function viewQuestion(){
    var v = vStr();
    if(viewVp==='v1') return { html:v+' は、'+viewInt+' と '+blankInput(0)+' を あわせた数です。',
                               ans:[Math.round((viewD1*10+viewD2))/100] };          // 0.45
    if(viewVp==='v2') return { html:v+' は、'+vUpperStr()+' より '+blankInput(0)+' 小さい数です。',
                               ans:[(10-viewD2)/100] };                              // 0.05
    if(viewVp==='v3') return { html:v+' は、0.01 を '+blankInput(0)+' こ あつめた数です。',
                               ans:[viewInt*100+viewD1*10+viewD2] };                 // 345
    return { html:v+' は、1 を '+viewInt+' こ、0.1 を '+blankInput(0)+' こ、0.01 を '+blankInput(1)+' こ あわせた数です。',
             ans:[viewD1, viewD2] };                                                 // 4, 5
  }

  function renderView(){
    renderViewNL();
    var q = viewQuestion();
    viewExpected = q.ans;
    document.getElementById('viewq').innerHTML = q.html;
    var blanks = document.querySelectorAll('#viewq .vbl');
    Array.prototype.forEach.call(blanks, function(b){
      b.addEventListener('focus', function(){ keyTarget = b; });
      b.addEventListener('input', function(){ hideMaru(); hideBatsu(); sanitize(b); });
      b.addEventListener('keydown', function(e){ if(e.key==='Enter'){ e.preventDefault(); check(); } });
    });
    keyTarget = blanks[0] || ans;
    document.getElementById('viewreveal').textContent =
      viewRevealed ? ('こたえ：'+ q.ans.map(String).join('、')) : '';
  }

  function newViewArrow(){ viewD1=rnd(0,9); viewD2=rnd(1,9); viewRevealed=false; }
  function newView(){ viewInt=rnd(1,9); newViewArrow(); viewHint=false; }
  function pickVp(){ return ['v1','v2','v3','v4'][rnd(0,3)]; }

  // --- 不等号モード ---
  var ineqA=null, ineqB=null, ineqHidden=false, ineqChoice='', ineqRevealed=false, ineqFbMsg='', ineqFbCls='';
  function ineqVal(x){ return x.N + (x.d1*100 + x.d2*10 + x.d3)/1000; }
  function ineqCorrect(){ var a=ineqVal(ineqA), b=ineqVal(ineqB); return a>b?'>':(a<b?'<':'='); }

  function newIneq(){
    var N=rnd(1,19), A={N:N}, B={N:N};
    if(rnd(0,1)===0){                        // 1/10の位でちがう
      var t1=rnd(0,9), t2; do{ t2=rnd(0,9); }while(t2===t1);
      A.d1=t1; B.d1=t2;
      var aLong = (rnd(0,1)===0);
      A.len=aLong?3:2; B.len=aLong?2:3;
      [A,B].forEach(function(x){
        if(x.len===3){ x.d2=rnd(0,9); x.d3=rnd(1,9); }
        else { x.d2=rnd(1,9); x.d3=0; }
      });
    } else {                                 // 1/100の位でちがう（1/10は同じ）
      var t=rnd(0,9), h1=rnd(0,9), h2; do{ h2=rnd(0,9); }while(h2===h1);
      A.d1=B.d1=t; A.d2=h1; B.d2=h2;
      var aL3 = (h1===0) ? true : (h2===0 ? false : (rnd(0,1)===0));
      A.len=aL3?3:2; B.len=aL3?2:3;
      A.d3=(A.len===3)?rnd(1,9):0;
      B.d3=(B.len===3)?rnd(1,9):0;
    }
    ineqA=A; ineqB=B;
    ineqHidden=false; ineqChoice=''; ineqRevealed=false; ineqFbMsg=''; ineqFbCls='';
  }

  // ちがいが決まる位（1=1/10, 2=1/100, 3=1/1000）。それより下をうすくする
  function ineqDecPlace(){
    if(ineqA.d1!==ineqB.d1) return 1;
    if(ineqA.d2!==ineqB.d2) return 2;
    if(ineqA.d3!==ineqB.d3) return 3;
    return 2;                              // 同じ大きさ（=）は 1/100 まで見せる
  }
  function ineqNumHtml(x){
    if(!ineqHidden){
      var s = x.N+'.'+x.d1+x.d2; if(x.len===3) s += x.d3;
      return '<span class="num">'+s+'</span>';
    }
    var dp = ineqDecPlace(), ds = ''+x.d1+x.d2+x.d3;   // 3けたにそろえる
    var vis = ds.slice(0,dp), fai = ds.slice(dp);
    var h = x.N+'.'+vis + (fai ? '<span class="faint">'+fai+'</span>' : '');
    return '<span class="num">'+h+'</span>';
  }
  function ineqSymHtml(s){ return s==='>'?'&gt;':(s==='<'?'&lt;':'='); }
  function renderIneq(){
    var box = ineqRevealed ? ineqCorrect() : ineqChoice;
    document.getElementById('cmp').innerHTML =
      ineqNumHtml(ineqA) + '<span class="ibox'+(box?' filled':'')+'">'+(box?ineqSymHtml(box):'&nbsp;')+'</span>' + ineqNumHtml(ineqB);
    document.getElementById('iHideBtn').classList.toggle('on', ineqHidden);
    Array.prototype.forEach.call(document.querySelectorAll('#ineqChoices button'), function(b){
      b.classList.toggle('on', !ineqRevealed && b.getAttribute('data-sym')===ineqChoice);
    });
    var el=document.getElementById('ineqfb');
    if(ineqRevealed){ el.textContent='こたえ：'+ineqCorrect(); el.className='ineqfb neutral'; }
    else { el.textContent=ineqFbMsg; el.className='ineqfb '+(ineqFbCls||''); }
  }

  // --- kg単位モード ---
  var kgKg=3, kgG=450, kgHint=false, kgRevealed=false;
  function kgAnswer(){ return kgKg + kgG/1000; }
  function kgCanonical(){ return String(Math.round(kgAnswer()*1000)/1000); }   // 余分な0なしの形（例 8.13）
  function kgWeightStr(){ return (kgKg>0) ? (kgKg+'kg'+kgG+'g') : (kgG+'g'); }
  function newKg(){ kgKg=rnd(0,9); kgG=rnd(1,999); kgHint=false; kgRevealed=false; }
  function newKgHard(){
    kgKg = rnd(0,9);
    if(rnd(0,1)===0){ kgG = rnd(1,99); }                 // 空位の0（例 12g→0.012）
    else { kgG = rnd(1,9)*100 + rnd(0,9)*10; }            // 末尾の0（例 130g→0.13, 100g→0.1）
    kgHint=false; kgRevealed=false;
  }
  function checkKg(){
    var raw = ans.value.trim();
    if(raw==='' || raw==='.'){ setFb('すうじを いれてね', 'neutral'); return; }
    if(isNaN(parseFloat(raw))){ setFb('すうじを いれてね', 'neutral'); return; }
    var norm = (raw.charAt(0)==='.') ? ('0'+raw) : raw;   // 「.075」も「0.075」とみなす
    if(norm === kgCanonical()){ setFb('◯ せいかい！', 'ok'); showMaru(); }
    else if(Math.abs(parseFloat(raw) - kgAnswer()) < 1e-9){
      setFb('✗ おしい！ うしろの 0 は いりません', 'ng'); showBatsu();   // 値は合うが0が余分
    } else { setFb('✗ もういちど', 'ng'); showBatsu(); }
  }

  function buildKgGrid(){
    var x0=50,y0=20,W=80,H=90,yb=y0+H, s='<svg viewBox="0 0 420 200" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:430px;height:auto">';
    s += '<rect x="'+x0+'" y="'+y0+'" width="'+(4*W)+'" height="'+H+'" fill="none" stroke="var(--line)" stroke-width="3"/>';
    for(var i=1;i<4;i++){ var xv=x0+i*W;
      s += '<line x1="'+xv+'" y1="'+y0+'" x2="'+xv+'" y2="'+yb+'" stroke="var(--line)" stroke-width="'+(i===1?3:2)+'"/>'; }
    var dx=x0+W;                                  // 小数点（kgとgの間）
    s += '<line x1="'+dx+'" y1="'+yb+'" x2="'+dx+'" y2="'+(yb+46)+'" stroke="var(--ink)" stroke-width="3"/>';
    s += '<circle cx="'+dx+'" cy="'+yb+'" r="7" fill="var(--ink)"/>';
    s += '<text x="'+(x0+W/2)+'" y="'+(yb+40)+'" text-anchor="middle" font-size="30" font-weight="800" fill="var(--ink)">kg</text>';
    s += '<text x="'+(x0+3.5*W)+'" y="'+(yb+40)+'" text-anchor="middle" font-size="30" font-weight="800" fill="var(--ink)">g</text>';
    if(kgHint){
      var d=[kgKg, Math.floor(kgG/100), Math.floor(kgG/10)%10, kgG%10];
      for(var c=0;c<4;c++){
        s += '<text x="'+(x0+c*W+W/2)+'" y="'+(y0+64)+'" text-anchor="middle" font-size="52" font-weight="800" fill="var(--arrow)">'+d[c]+'</text>';
      }
    }
    s += '</svg>';
    return s;
  }
  function renderKg(){
    document.getElementById('kgweight').textContent = kgWeightStr();
    document.getElementById('kggrid').innerHTML = buildKgGrid();
    document.getElementById('kgHintBtn').classList.toggle('on', kgHint);
    document.getElementById('kgreveal').textContent =
      kgRevealed ? ('こたえ：'+ (Math.round(kgAnswer()*1000)/1000) +' kg') : '';
  }

  // --- こたえ入力 ---
  var ans = document.getElementById('ans');
  var fb  = document.getElementById('fb');
  var maru = document.getElementById('maru');
  var seikai = document.getElementById('seikai');
  var batsu = document.getElementById('batsu');

  var maruTimer = null;
  function showMaru(){
    hideBatsu();

  }
  function hideMaru(){
    if(maruTimer){ clearTimeout(maruTimer); maruTimer=null; }
    maru.classList.remove('show');

  var batsuTimer = null;
  function showBatsu(){            // まちがい：はなまると同じ動き・音なし・1秒で消える

    void batsu.offsetWidth;
    batsu.classList.add('show');
    if(batsuTimer) clearTimeout(batsuTimer);

  function setFb(msg, cls){ fb.textContent = msg; fb.className = 'fb ' + (cls||''); }
  function clearAll(){
    ans.value='';

    setFb('',''); hideMaru(); hideBatsu();
  }

  // テンキーは「いま選ばれている入力欄」に打ち込む（こたえ欄 or 見方の□）
  var keyTarget = ans;
  function sanitize(el){
    var v = el.value.replace(/[^0-9.]/g,'');
    var i = v.indexOf('.');
    if(i !== -1){ v = v.slice(0,i+1) + v.slice(i+1).replace(/\./g,''); }
    el.value = v;
  }
  ans.addEventListener('focus', function(){ keyTarget = ans; });
  ans.addEventListener('input', function(){ hideMaru(); hideBatsu(); sanitize(ans); });

  function press(k){
    hideMaru(); hideBatsu();
    var t = keyTarget || ans;
    if(k==='clear'){ t.value=''; setFb('',''); return; }
    if(k==='back'){ t.value = t.value.slice(0,-1); return; }
    if(k==='.'){ if(t.value.indexOf('.')!==-1) return; if(t.value==='') t.value='0'; t.value += '.'; return; }
    t.value += k;
  }

  Array.prototype.forEach.call(document.querySelectorAll('.pad button[data-k]'), function(btn){
    btn.addEventListener('click', function(){ press(btn.getAttribute('data-k')); });
  });

  function checkView(){
    var blanks = document.querySelectorAll('#viewq .vbl');
    if(blanks.length===0) return;
    var allFilled=true, allOk=true;
    Array.prototype.forEach.call(blanks, function(b){
      var i=+b.getAttribute('data-i'), raw=b.value.trim();
      if(raw===''||raw==='.'){ allFilled=false; return; }
      var v=parseFloat(raw);
      if(isNaN(v) || Math.abs(v - viewExpected[i]) > 1e-9) allOk=false;
    });
    if(!allFilled){ setFb('すうじを いれてね', 'neutral'); return; }
    if(allOk){ setFb('◯ せいかい！', 'ok'); showMaru(); }
    else { setFb('✗ もういちど', 'ng'); showBatsu(); }
  }

  function check(){
    if(mode==='ineq'){ return; }
    if(mode==='view'){ checkView(); return; }
    if(mode==='kg'){ checkKg(); return; }
    var raw = ans.value.trim();
    if(raw==='' || raw==='.'){ setFb('すうじを いれてね', 'neutral'); return; }
    var v = parseFloat(raw);
    if(isNaN(v)){ setFb('すうじを いれてね', 'neutral'); return; }
    var target = (mode==='mul') ? mulCorrect() : arrowTh/1000;
    if(Math.abs(v - target) < 1e-9){ setFb('◯ せいかい！', 'ok'); showMaru(); }
    else { setFb('✗ もういちど', 'ng'); showBatsu(); }
  }

  // --- ヒントボタン（レベルで段階がちがう）---
  var hintBtn = document.getElementById('hintBtn');
  function hintLabel(){
    if(level===1){ return hintStage>=1 ? 'ヒントを消す' : 'ヒント（0をつける）'; }
    if(hintStage===0) return 'ヒント①（数を入れる）';
    if(hintStage===1) return 'ヒント②（0をつける）';
    return 'ヒントを消す';
  }
  function updateHintBtn(){
    hintBtn.textContent = hintLabel();
    hintBtn.classList.toggle('on', hintStage>0);
  }
  hintBtn.addEventListener('click', function(){
    hintStage = (hintStage+1) % (maxHint()+1);
    render();
  });

  // --- そのほかのボタン ---
  document.getElementById('randBtn').addEventListener('click', function(){
    newArrow(); clearAll(); render();
  });
  document.getElementById('regenBtn').addEventListener('click', function(){
    regenerate(); clearAll(); render();
  });
  document.getElementById('revealBtn').addEventListener('click', function(){
    if(mode==='mul'){ mulRevealed = !mulRevealed; renderMul(); }
    else if(mode==='view'){ viewRevealed = !viewRevealed; renderView(); }
    else if(mode==='kg'){ kgRevealed = !kgRevealed; renderKg(); }
    else { revealed = !revealed; render(); }
  });
  document.getElementById('checkBtn').addEventListener('click', check);
  ans.addEventListener('keydown', function(e){ if(e.key==='Enter') check(); });

  // --- 小数の見方モードの操作 ---
  function updateVpChips(){
    Array.prototype.forEach.call(document.querySelectorAll('#vops button'), function(b){
      var vp=b.getAttribute('data-vp');
      b.classList.toggle('on', viewRand ? (vp==='rand') : (vp===viewVp));
    });
  }
  Array.prototype.forEach.call(document.querySelectorAll('#vops button'), function(b){
    b.addEventListener('click', function(){
      var vp = b.getAttribute('data-vp');
      if(vp==='rand'){ viewRand=true; viewVp=pickVp(); }
      else { viewRand=false; viewVp=vp; }
      viewRevealed=false;
      updateVpChips(); clearAll(); renderView();
    });
  });
  var vHintBtn = document.getElementById('vHintBtn');
  vHintBtn.addEventListener('click', function(){
    viewHint = !viewHint;
    vHintBtn.classList.toggle('on', viewHint);
    renderView();
  });
  document.getElementById('vRandBtn').addEventListener('click', function(){
    newViewArrow(); if(viewRand) viewVp=pickVp();   // ランダム見方なら見方も変える
    clearAll(); renderView();
  });
  document.getElementById('vRegenBtn').addEventListener('click', function(){
    newView(); if(viewRand) viewVp=pickVp();
    vHintBtn.classList.remove('on'); updateVpChips(); clearAll(); renderView();
  });

  // --- 不等号モードの操作 ---
  Array.prototype.forEach.call(document.querySelectorAll('#ineqChoices button'), function(b){
    b.addEventListener('click', function(){
      ineqChoice = b.getAttribute('data-sym'); ineqRevealed = false;
      var ok = (ineqChoice === ineqCorrect());
      ineqFbMsg = ok ? '◯ せいかい！' : '✗ もういちど';
      ineqFbCls = ok ? 'ok' : 'ng';
      renderIneq();
      if(ok) showMaru(); else showBatsu();
    });
  });
  document.getElementById('iHideBtn').addEventListener('click', function(){
    ineqHidden = !ineqHidden; renderIneq();
  });
  document.getElementById('iNextBtn').addEventListener('click', function(){
    newIneq(); hideMaru(); hideBatsu(); renderIneq();
  });
  document.getElementById('iRevealBtn').addEventListener('click', function(){
    ineqRevealed = !ineqRevealed; renderIneq();
  });

  // --- kg単位モードの操作 ---
  document.getElementById('kgHintBtn').addEventListener('click', function(){
    kgHint = !kgHint; renderKg();
  });
  document.getElementById('kgNextBtn').addEventListener('click', function(){
    newKg(); clearAll(); renderKg();
  });
  document.getElementById('kgHardBtn').addEventListener('click', function(){
    newKgHard(); clearAll(); renderKg();
  });

  // --- 10倍モードの操作 ---
  function pickMulOp(){ return ['x10','x100','d10','d100'][rnd(0,3)]; }
  function updateOpChips(){
    Array.prototype.forEach.call(document.querySelectorAll('#ops button'), function(b){
      var op=b.getAttribute('data-op');
      b.classList.toggle('on', mulRand ? (op==='rand') : (op===mulOp));
    });
  }
  Array.prototype.forEach.call(document.querySelectorAll('#ops button'), function(b){
    b.addEventListener('click', function(){
      var op = b.getAttribute('data-op');
      if(op==='rand'){ mulRand=true; op=pickMulOp(); }
      else { mulRand=false; }
      mulOp = op;
      newMul(op);                        // 押すたびに新しい数。割り算なら整数スタート多め
      updateOpChips(); clearAll(); renderMul();
    });
  });

  // 小数点をドラッグ（数字は固定／点だけ動く・列は固定なので位置を正確に判定）
  var mover = document.getElementById('mover');
  var dragging = false;
  function posFromEvent(e){
    var svg = mover.querySelector('svg'); if(!svg) return null;
    var r = svg.getBoundingClientRect();
    var x = (e.clientX - r.left) * (MV_VW / r.width);
    var p = Math.round((x - MV_M - mvOffset)/MV_W) - 2;
    if(mulIsInteger && !mulPlaced){
      return Math.max(1, Math.min(digits.length, p));   // 点をつける段階：数字のあいだ〜右はし
    }
    return Math.max(BASEPOS-2, Math.min(BASEPOS+2, p));
  }
  function applyPos(p){
    if(p===null) return;
    if(mulIsInteger && !mulPlaced){
      if(p!==pointPos || !mulPointShown){ pointPos=p; mulPointShown=true; }
      if(pointPos===digits.length){                     // 右はしを選んだら確定
        mulPlaced=true; mulPointShown=false; mulMsg=''; dragging=false; renderMul();
      } else {
        mulMsg='ちがうよ。整数の 小数点は いちばん 右はし（一のくらいの 右）だよ。';
        renderMul();
      }
      return;
    }
    if(p!==pointPos){ pointPos=p; hideMaru(); hideBatsu(); renderMul(); }
  }
  mover.addEventListener('pointerdown', function(e){
    dragging = true;
    applyPos(posFromEvent(e));
    if(mover.setPointerCapture){ try{ mover.setPointerCapture(e.pointerId); }catch(_){} }
    e.preventDefault();
  });
  mover.addEventListener('pointermove', function(e){
    if(!dragging) return;
    applyPos(posFromEvent(e));
  });
  mover.addEventListener('pointerup', function(){ dragging=false; });
  mover.addEventListener('pointercancel', function(){ dragging=false; });

  document.getElementById('ptReset').addEventListener('click', function(){
    if(mulIsInteger){ mulPlaced=false; mulPointShown=false; mulMsg=''; pointPos=digits.length; }
    else { pointPos = BASEPOS; }
    hideMaru(); hideBatsu(); renderMul();
  });

  // --- タブ切りかえ ---
  var tab1 = document.getElementById('tab1'),
      tabKg = document.getElementById('tabKg'),
      tab2 = document.getElementById('tab2'),
      tabIneq = document.getElementById('tabIneq'),
      tab3 = document.getElementById('tab3'),
      tab4 = document.getElementById('tab4');
  function setMode(m){
    mode = m;
    tab1.classList.toggle('on', m==='nl1');
    tabKg.classList.toggle('on', m==='kg');
    tab2.classList.toggle('on', m==='nl2');
    tabIneq.classList.toggle('on', m==='ineq');
    tab3.classList.toggle('on', m==='mul');
    tab4.classList.toggle('on', m==='view');
    var isNL=(m==='nl1'||m==='nl2'), isMul=(m==='mul'), isView=(m==='view'), isIneq=(m==='ineq'), isKg=(m==='kg');
    document.getElementById('nlArea').style.display   = isNL ? '' : 'none';
    document.getElementById('kgArea').style.display   = isKg ? '' : 'none';
    document.getElementById('mulArea').style.display  = isMul ? '' : 'none';
    document.getElementById('viewArea').style.display = isView ? '' : 'none';
    document.getElementById('ineqArea').style.display = isIneq ? '' : 'none';
    document.getElementById('rowNL').style.display    = isNL ? '' : 'none';
    document.getElementById('rowKg').style.display    = isKg ? '' : 'none';
    document.getElementById('rowMul').style.display   = isMul ? '' : 'none';
    document.getElementById('rowView').style.display  = isView ? '' : 'none';
    document.getElementById('rowIneq').style.display  = isIneq ? '' : 'none';
    document.querySelector('.answer').style.display   = isIneq ? 'none' : '';
    var unitEl = document.getElementById('unit');
    if(isNL){ unitEl.textContent='m'; unitEl.style.display=''; }
    else if(isKg){ unitEl.textContent='kg'; unitEl.style.display=''; }
    else { unitEl.style.display='none'; }
    document.getElementById('ans').style.display      = isView ? 'none' : '';
    document.querySelector('.answer .lbl').textContent = isView ? 'あてはまる数を □ に入れてね' : 'こたえ';
    clearAll();
    keyTarget = ans;
    if(isMul){
      ans.placeholder = 'れい：91.3';
      mulRand=false; mulOp='x10'; newMul('x10'); updateOpChips(); renderMul();
    } else if(isView){
      viewRand=false; viewVp='v1'; vHintBtn.classList.remove('on');
      newView(); updateVpChips(); renderView();
    } else if(isIneq){
      newIneq(); renderIneq();
    } else if(isKg){
      ans.placeholder = 'れい：3.45';
      newKg(); renderKg();
    } else {
      level = (m==='nl1') ? 1 : 2;
      ans.placeholder = (level===1) ? 'れい：4.297' : 'れい：2.413';
      regenerate(); render();
    }
  }
  tab1.addEventListener('click', function(){ if(mode!=='nl1') setMode('nl1'); });
  tabKg.addEventListener('click', function(){ if(mode!=='kg') setMode('kg'); });
  tab2.addEventListener('click', function(){ if(mode!=='nl2') setMode('nl2'); });
  tabIneq.addEventListener('click', function(){ if(mode!=='ineq') setMode('ineq'); });
  tab3.addEventListener('click', function(){ if(mode!=='mul') setMode('mul'); });
  tab4.addEventListener('click', function(){ if(mode!=='view') setMode('view'); });

  render();
})();
</script>
</body>
</html>
